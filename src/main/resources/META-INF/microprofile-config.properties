# ============================================================
# MicroProfile Configuration — Conference API
# ============================================================

# --- JWT (Security Shield) ---
mp.jwt.verify.publickey.location=META-INF/publicKey.pem
mp.jwt.verify.issuer=https://confapi.example.com

# --- Request Signature (Security Shield) ---
api.signature.secret=super-secret-demo-key

# --- OpenAPI (Living Contract) ---
mp.openapi.filter=com.mehmandarov.confapi.openapi.ConferenceOASFilter
mp.openapi.scan.disable=false

# --- OpenTelemetry (The Lens) ---
otel.service.name=confapi
otel.traces.exporter=otlp
otel.exporter.otlp.endpoint=http://localhost:4317
# Set to "none" to disable tracing locally without an OTel collector:
# otel.traces.exporter=none

# --- Health & Management Endpoints ---
# MicroProfile standard paths: /health, /health/live, /health/ready, /openapi
# Quarkus non-standardly prefixes these under /q/* by default.
# This property restores standard MicroProfile paths. Ignored by other runtimes.
quarkus.http.non-application-root-path=/

