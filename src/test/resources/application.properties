# ============================================================
# Test Configuration — overrides for integration tests
# ============================================================

# Disable OTel export during tests (standard OpenTelemetry env vars)
otel.traces.exporter=none
otel.sdk.disabled=true

# Signature secret for testing
api.signature.secret=test-secret

# JWT verification
mp.jwt.verify.publickey.location=META-INF/publicKey.pem
mp.jwt.verify.issuer=https://confapi.example.com
